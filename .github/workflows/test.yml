# SCENARIO: mixed-pass-fail-flaky
# ~200 tests, ~70/15/10/5 pass/fail/flaky/skip, varied error types, full
# artifacts (trace/screenshot/video). 2 shards x 4 workers.
name: Run Playwright tests (mixed-pass-fail-flaky)

on:
  pull_request:
  schedule:
    - cron: '30 3 * * 1-5'
  workflow_dispatch:
    inputs:
      mixed_test_count:
        description: 'How many mixed tests to generate'
        required: false
        default: '200'

jobs:
  run-tests:
    name: Run Playwright shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    env:
      MIXED_TEST_COUNT: ${{ github.event.inputs.mixed_test_count || '200' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install deps + browsers
        run: |
          npm ci
          npx playwright install --with-deps

      # Some tests fail by design — don't let a nonzero exit cancel the upload.
      - name: Run shard ${{ matrix.shardIndex }}
        run: npx playwright test --project=chromium --reporter=blob --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        continue-on-error: true

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: ./blob-report
          retention-days: 1

  merge-reports:
    name: Merge Reports
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install deps + browsers
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: ./all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge HTML & JSON reports
        run: npx playwright merge-reports --config=playwright.config.ts ./all-blob-reports

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: Playwright Test Report
          path: ./playwright-report
          retention-days: 14

      - name: Send TestDino report
        env:
          TDPW_TOKEN: ${{ secrets.TDPW_TOKEN }}
        run: |
          npx tdpw ./playwright-report \
            --token="$TDPW_TOKEN" \
            --upload-html \
            --verbose
